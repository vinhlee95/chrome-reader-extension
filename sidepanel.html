<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Reader</title>
  <link rel="stylesheet" href="sidepanel.css">
  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 id="page-title">Chrome Reader</h1>
      <div style="display:flex;align-items:center;gap:4px;">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <svg id="theme-icon-system" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="4" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 17h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M10 14v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg id="theme-icon-light" class="hidden" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg id="theme-icon-dark" class="hidden" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M17 12.5A7.5 7.5 0 117.5 3 5.5 5.5 0 0017 12.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16.5 10c0-.34-.03-.66-.07-.98l1.57-1.2-.75-1.3-1.84.7a5.96 5.96 0 00-1.7-.98L13.35 4.5h-1.5l-.36 1.74a5.96 5.96 0 00-1.7.98l-1.84-.7-.75 1.3 1.57 1.2A6.1 6.1 0 008.7 10c0 .34.03.66.07.98l-1.57 1.2.75 1.3 1.84-.7c.5.42 1.07.75 1.7.98l.36 1.74h1.5l.36-1.74a5.96 5.96 0 001.7-.98l1.84.7.75-1.3-1.57-1.2c.04-.32.07-.64.07-.98z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        </button>
      </div>
    </header>


<div id="messages" class="messages">
      <div class="welcome">
        <p>Ask me anything about the current page.</p>
        <div class="suggestions">
          <button class="suggestion-btn" data-prompt="Summarize this page">Summarize this page</button>
          <button class="suggestion-btn" data-prompt="What are the key points?">What are the key points?</button>
          <button class="suggestion-btn" data-prompt="Explain in simple terms">Explain in simple terms</button>
        </div>
      </div>
    </div>

    <div id="api-key-banner" class="banner hidden">
      <span>API key not set.</span>
      <button id="banner-settings-btn">Set up</button>
    </div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Ask about this page..." rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 10l14-7-7 14v-7H3z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
