<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Reader</title>
  <link rel="stylesheet" href="sidepanel.css">
  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Chrome Reader</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 13a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16.5 10c0-.34-.03-.66-.07-.98l1.57-1.2-.75-1.3-1.84.7a5.96 5.96 0 00-1.7-.98L13.35 4.5h-1.5l-.36 1.74a5.96 5.96 0 00-1.7.98l-1.84-.7-.75 1.3 1.57 1.2A6.1 6.1 0 008.7 10c0 .34.03.66.07.98l-1.57 1.2.75 1.3 1.84-.7c.5.42 1.07.75 1.7.98l.36 1.74h1.5l.36-1.74a5.96 5.96 0 001.7-.98l1.84.7.75-1.3-1.57-1.2c.04-.32.07-.64.07-.98z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </header>

    <div id="page-context" class="page-context hidden">
      <span id="page-title"></span>
    </div>

    <div id="messages" class="messages">
      <div class="welcome">
        <p>Ask me anything about the current page.</p>
        <div class="suggestions">
          <button class="suggestion-btn" data-prompt="Summarize this page">Summarize this page</button>
          <button class="suggestion-btn" data-prompt="What are the key points?">What are the key points?</button>
          <button class="suggestion-btn" data-prompt="Explain in simple terms">Explain in simple terms</button>
        </div>
      </div>
    </div>

    <div id="api-key-banner" class="banner hidden">
      <span>API key not set.</span>
      <button id="banner-settings-btn">Set up</button>
    </div>

    <div class="input-area">
      <textarea id="user-input" placeholder="Ask about this page..." rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 10l14-7-7 14v-7H3z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
